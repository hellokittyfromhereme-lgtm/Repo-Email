<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickMail - Email Service</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #006a4e 0%, #f42a41 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            font-size: 36px;
            background: linear-gradient(135deg, #006a4e, #f42a41);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .made-by {
            text-align: center;
            margin-top: 10px;
            color: #666;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #006a4e;
        }
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #006a4e, #f42a41);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover {
            opacity: 0.9;
        }
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 10px;
            color: white;
            z-index: 1001;
            animation: slideIn 0.3s ease;
        }
        .toast.success { background: #006a4e; }
        .toast.error { background: #f42a41; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .char-count {
            text-align: right;
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
        .optional {
            font-size: 11px;
            background: #f0f0f0;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <div class="card">
            <div class="logo">
                <h1>📧 QUICKMAIL</h1>
            </div>
            <div class="made-by">
                <span>Made by Hossain | Made in Bangladesh 🇧🇩</span>
            </div>

            <form id="emailForm">
                <div class="form-group">
                    <label>Sender's Name *</label>
                    <input type="text" id="name" required>
                </div>

                <div class="form-group">
                    <label>Sender's Email *</label>
                    <input type="email" id="from" required>
                </div>

                <div class="form-group">
                    <label>Receiver's Email *</label>
                    <input type="email" id="to" required>
                </div>

                <div class="form-group">
                    <label>Reply To <span class="optional">Optional</span></label>
                    <input type="email" id="replyto">
                </div>

                <div class="form-group">
                    <label>Subject *</label>
                    <input type="text" id="subject" required>
                </div>

                <div class="form-group">
                    <label>Message *</label>
                    <textarea id="message" required></textarea>
                    <div class="char-count"><span id="charCount">0</span> characters</div>
                </div>

                <button type="submit">📧 Send Email</button>
            </form>
        </div>
    </div>

    <script>
        // Character counter
        const messageField = document.getElementById('message');
        const charCount = document.getElementById('charCount');
        messageField.addEventListener('input', () => {
            charCount.textContent = messageField.value.length;
        });

        // Form submit
        document.getElementById('emailForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const loading = document.getElementById('loading');
            loading.style.display = 'flex';
            
            const data = {
                name: document.getElementById('name').value,
                from: document.getElementById('from').value,
                email: document.getElementById('to').value,
                replyto: document.getElementById('replyto').value,
                subject: document.getElementById('subject').value,
                message: document.getElementById('message').value
            };
            
            try {
                const response = await fetch('/api/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                loading.style.display = 'none';
                
                if (result.success) {
                    showToast(result.message, 'success');
                    document.getElementById('emailForm').reset();
                    charCount.textContent = '0';
                } else {
                    showToast(result.error, 'error');
                }
            } catch (error) {
                loading.style.display = 'none';
                showToast('Network error: ' + error.message, 'error');
                console.error('Error:', error);
            }
        });
        
        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }
    </script>
</body>
</html>
