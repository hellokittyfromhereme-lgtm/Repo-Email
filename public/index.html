<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickMail - Send Email</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #006a4e 0%, #f42a41 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 550px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            font-size: 38px;
            background: linear-gradient(135deg, #006a4e, #f42a41);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .badge {
            text-align: center;
            margin: 15px 0;
            padding: 8px;
            background: #f0f0f0;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
        }
        .badge span {
            color: #006a4e;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        input, textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #006a4e;
            box-shadow: 0 0 0 3px rgba(0,106,78,0.1);
        }
        textarea {
            min-height: 110px;
            resize: vertical;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #006a4e, #f42a41);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        button:hover {
            transform: scale(1.02);
            opacity: 0.95;
        }
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
            gap: 15px;
        }
        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 28px;
            border-radius: 60px;
            color: white;
            font-weight: 500;
            z-index: 1001;
            animation: fadeUp 0.3s ease;
            white-space: nowrap;
        }
        .toast.success { background: #006a4e; }
        .toast.error { background: #f42a41; }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        .char-count {
            text-align: right;
            font-size: 12px;
            color: #888;
            margin-top: 6px;
        }
        .optional-badge {
            font-size: 11px;
            background: #f0f0f0;
            padding: 3px 10px;
            border-radius: 30px;
            margin-left: 10px;
            font-weight: normal;
        }
        .footer {
            text-align: center;
            margin-top: 25px;
            font-size: 12px;
            color: #aaa;
        }
        @media (max-width: 550px) {
            .card { padding: 28px; }
            .logo h1 { font-size: 30px; }
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div style="color:white;">Sending email...</div>
    </div>

    <div class="container">
        <div class="card">
            <div class="logo">
                <h1>📧 QUICKMAIL</h1>
            </div>
            <div class="badge">
                ✨ Made by <span>Hossain</span> | Made in <span>Bangladesh</span> 🇧🇩
            </div>

            <form id="emailForm">
                <div class="form-group">
                    <label>👤 Your Name *</label>
                    <input type="text" id="name" placeholder="Hossain Mahmud" required>
                </div>

                <div class="form-group">
                    <label>📧 Your Email *</label>
                    <input type="email" id="from_email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label>🎯 Receiver Email *</label>
                    <input type="email" id="to_email" placeholder="friend@example.com" required>
                </div>

                <div class="form-group">
                    <label>↩️ Reply To <span class="optional-badge">Optional</span></label>
                    <input type="email" id="replyto" placeholder="reply@example.com">
                </div>

                <div class="form-group">
                    <label>📌 Subject *</label>
                    <input type="text" id="subject" placeholder="Hello, I have a question..." required>
                </div>

                <div class="form-group">
                    <label>💬 Message *</label>
                    <textarea id="message" placeholder="Write your message here..." required></textarea>
                    <div class="char-count"><span id="charCount">0</span> characters</div>
                </div>

                <button type="submit">✈️ Send Email</button>
            </form>
            <div class="footer">
                ⚡ Instant delivery • Powered by EmailJS • Made in Bangladesh
            </div>
        </div>
    </div>

    <script>
        // ============ YOUR EMAILJS CONFIGURATION ============
        const EMAILJS_PUBLIC_KEY = 'IFGrMfv4ZZezZaNUg';
        const EMAILJS_SERVICE_ID = 'service_6q1uzvq';
        const EMAILJS_TEMPLATE_ID = 'template_my062wf';
        // ==================================================
        
        // Initialize EmailJS
        emailjs.init(EMAILJS_PUBLIC_KEY);
        
        // Character counter
        const msg = document.getElementById('message');
        const charSpan = document.getElementById('charCount');
        msg.addEventListener('input', () => {
            charSpan.innerText = msg.value.length;
        });
        
        // Email validation
        function validateEmail(email) {
            return /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/.test(email);
        }
        
        // Form submit
        document.getElementById('emailForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const loadingDiv = document.getElementById('loading');
            loadingDiv.style.display = 'flex';
            
            const name = document.getElementById('name').value.trim();
            const from_email = document.getElementById('from_email').value.trim();
            const to_email = document.getElementById('to_email').value.trim();
            const replyto = document.getElementById('replyto').value.trim();
            const subject = document.getElementById('subject').value.trim();
            const message = document.getElementById('message').value.trim();
            
            // Validate
            if (!name || !from_email || !to_email || !subject || !message) {
                loadingDiv.style.display = 'none';
                showToast('❌ Please fill all required fields', 'error');
                return;
            }
            
            if (!validateEmail(from_email)) {
                loadingDiv.style.display = 'none';
                showToast('❌ Invalid sender email', 'error');
                return;
            }
            
            if (!validateEmail(to_email)) {
                loadingDiv.style.display = 'none';
                showToast('❌ Invalid receiver email', 'error');
                return;
            }
            
            try {
                const templateParams = {
                    name: name,
                    from_email: from_email,
                    to_email: to_email,
                    reply_to: replyto || from_email,
                    subject: subject,
                    message: message
                };
                
                const response = await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams);
                
                loadingDiv.style.display = 'none';
                
                if (response.status === 200) {
                    showToast(`✅ Email sent to ${to_email}`, 'success');
                    document.getElementById('emailForm').reset();
                    charSpan.innerText = '0';
                } else {
                    showToast('❌ Failed to send. Please try again.', 'error');
                }
            } catch (error) {
                loadingDiv.style.display = 'none';
                showToast('❌ Error: ' + (error.text || 'Something went wrong'), 'error');
                console.error(error);
            }
        });
        
        function showToast(msg, type) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4500);
        }
    </script>
</body>
</html>
