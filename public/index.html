<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickMail - Professional Email Service</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #006a4e 0%, #f42a41 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        .logo-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo-icon { font-size: 60px; color: #006a4e; margin-bottom: 15px; }
        .logo-card h1 {
            font-size: 42px;
            background: linear-gradient(135deg, #006a4e, #f42a41);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .made-by {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #e0e0e0;
        }
        .made-by .name { color: #006a4e; font-size: 18px; font-weight: 600; }
        .made-by .country { color: #f42a41; margin-top: 5px; }
        .form-card {
            background: rgba(255,255,255,0.98);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        .form-group label i { margin-right: 8px; color: #006a4e; }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #006a4e;
        }
        .form-group textarea { min-height: 120px; resize: vertical; }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #006a4e, #f42a41);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .submit-btn:hover { transform: translateY(-2px); opacity: 0.95; }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: #006a4e;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            z-index: 1001;
            animation: slideIn 0.3s ease;
        }
        .toast.success { background: linear-gradient(135deg, #006a4e, #008b5e); }
        .toast.error { background: linear-gradient(135deg, #f42a41, #c62828); }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .char-counter { font-size: 12px; color: #999; text-align: right; margin-top: 5px; }
        .optional-badge { font-size: 11px; background: #e0e0e0; padding: 2px 8px; border-radius: 20px; margin-left: 8px; }
        @media (max-width: 768px) {
            .form-card { padding: 25px; }
            .logo-card h1 { font-size: 32px; }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text" style="color:white; margin-top:15px;">Sending Email...</div>
    </div>

    <div class="container">
        <div class="logo-card">
            <div class="logo-icon"><i class="fas fa-envelope-open-text"></i></div>
            <h1>QUICKMAIL</h1>
            <div class="made-by">
                <div class="name"><i class="fas fa-code"></i> Made by Hossain</div>
                <div class="country"><i class="fas fa-map-marker-alt"></i> Made in Bangladesh 🇧🇩</div>
            </div>
        </div>

        <div class="form-card">
            <form id="emailForm">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Sender's Name <span style="color:#f42a41;">*</span></label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-paper-plane"></i> Sender's Email <span style="color:#f42a41;">*</span></label>
                    <input type="email" id="sender" name="from" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-user-friends"></i> Receiver's Email <span style="color:#f42a41;">*</span></label>
                    <input type="email" id="receiver" name="email" placeholder="receiver@email.com" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-reply"></i> Reply To <span class="optional-badge">Optional</span></label>
                    <input type="email" id="replyto" name="replyto" placeholder="reply@email.com">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-tag"></i> Subject <span style="color:#f42a41;">*</span></label>
                    <input type="text" id="subject" name="subject" placeholder="Email Subject" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-comment-dots"></i> Message <span style="color:#f42a41;">*</span></label>
                    <textarea id="message" name="message" placeholder="Write your message here..." required></textarea>
                    <div class="char-counter"><span id="charCount">0</span> characters</div>
                </div>

                <button type="submit" class="submit-btn"><i class="fas fa-paper-plane"></i> Send Email</button>
            </form>
        </div>
    </div>

    <script>
        const messageInput = document.getElementById('message');
        const charCount = document.getElementById('charCount');
        messageInput.addEventListener('input', function() {
            charCount.textContent = this.value.length;
        });

        document.getElementById('emailForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            document.getElementById('loadingOverlay').style.display = 'flex';
            
            const formData = {
                name: document.getElementById('name').value,
                from: document.getElementById('sender').value,
                email: document.getElementById('receiver').value,
                replyto: document.getElementById('replyto').value,
                subject: document.getElementById('subject').value,
                message: document.getElementById('message').value
            };
            
            try {
                const response = await fetch('/api/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();
                document.getElementById('loadingOverlay').style.display = 'none';
                
                if (result.success) {
                    showToast(result.message, 'success');
                    document.getElementById('emailForm').reset();
                    charCount.textContent = '0';
                } else {
                    showToast(result.error || 'Failed to send', 'error');
                }
            } catch (error) {
                document.getElementById('loadingOverlay').style.display = 'none';
                showToast('Network error! Check console.', 'error');
                console.error('Error:', error);
            }
        });
        
        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }
        
        function validateEmail(email) {
            return /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/.test(email);
        }
        
        document.getElementById('sender').addEventListener('blur', function() {
            if (this.value && !validateEmail(this.value)) {
                showToast('Invalid sender email!', 'error');
                this.style.borderColor = '#f42a41';
            } else {
                this.style.borderColor = '#e0e0e0';
            }
        });
        
        document.getElementById('receiver').addEventListener('blur', function() {
            if (this.value && !validateEmail(this.value)) {
                showToast('Invalid receiver email!', 'error');
                this.style.borderColor = '#f42a41';
            } else {
                this.style.borderColor = '#e0e0e0';
            }
        });
    </script>
</body>
</html>
