<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickMail - Send Email</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #006a4e 0%, #f42a41 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #006a4e, #f42a41);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .badge {
            text-align: center;
            margin-bottom: 25px;
            padding: 8px;
            background: #f0f0f0;
            border-radius: 30px;
            font-size: 14px;
        }
        .field {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        input, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #006a4e;
        }
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #006a4e, #f42a41);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover {
            opacity: 0.9;
        }
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 30px;
            color: white;
            font-weight: 500;
            z-index: 1001;
            animation: fadeUp 0.3s ease;
        }
        .toast.success { background: #006a4e; }
        .toast.error { background: #f42a41; }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        .footer {
            text-align: center;
            margin-top: 25px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p style="color:white; margin-top:15px;">Sending email...</p>
    </div>

    <div class="card">
        <div class="logo">
            <h1>📧 QUICKMAIL</h1>
        </div>
        <div class="badge">
            ✨ Made by Hossain | Made in Bangladesh 🇧🇩
        </div>

        <form id="form">
            <div class="field">
                <label>👤 Your Name</label>
                <input type="text" name="name" id="name" placeholder="Hossain Mahmud" required>
            </div>
            <div class="field">
                <label>📧 Your Email</label>
                <input type="email" name="email" id="email" placeholder="you@example.com" required>
            </div>
            <div class="field">
                <label>🎯 Receiver Email</label>
                <input type="email" name="to_email" id="to_email" placeholder="friend@example.com" required>
            </div>
            <div class="field">
                <label>📌 Subject</label>
                <input type="text" name="subject" id="subject" placeholder="Email Subject" required>
            </div>
            <div class="field">
                <label>💬 Message</label>
                <textarea name="message" id="message" placeholder="Write your message here..." required></textarea>
            </div>
            <button type="submit" id="button">✈️ Send Email</button>
        </form>
        <div class="footer">
            Powered by EmailJS • Made in Bangladesh
        </div>
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
        // Initialize EmailJS
        emailjs.init('IFGrMfv4ZZezZaNUg');
        
        // Get form elements
        const form = document.getElementById('form');
        const loading = document.getElementById('loading');
        
        // Email validation function
        function validateEmail(email) {
            return /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/.test(email);
        }
        
        // Show toast notification
        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }
        
        // Form submit handler
        form.addEventListener('submit', function(event) {
            event.preventDefault();
            
            // Get form values
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const to_email = document.getElementById('to_email').value.trim();
            const subject = document.getElementById('subject').value.trim();
            const message = document.getElementById('message').value.trim();
            
            // Validate
            if (!name || !email || !to_email || !subject || !message) {
                showToast('❌ Please fill all fields!', 'error');
                return;
            }
            
            if (!validateEmail(email)) {
                showToast('❌ Invalid sender email!', 'error');
                return;
            }
            
            if (!validateEmail(to_email)) {
                showToast('❌ Invalid receiver email!', 'error');
                return;
            }
            
            // Show loading
            loading.style.display = 'flex';
            
            // Template parameters - MATCH YOUR TEMPLATE VARIABLES
            const templateParams = {
                name: name,
                email: email,
                to_email: to_email,
                subject: subject,
                message: message
            };
            
            // Send email
            emailjs.send('service_6q1uzvq', 'template_gyxfa4q', templateParams)
                .then(function(response) {
                    loading.style.display = 'none';
                    console.log('SUCCESS!', response.status, response.text);
                    showToast(`✅ Email sent successfully to ${to_email}`, 'success');
                    form.reset();
                }, function(error) {
                    loading.style.display = 'none';
                    console.log('FAILED...', error);
                    showToast(`❌ Failed: ${error.text || 'Please check template variables'}`, 'error');
                });
        });
    </script>
</body>
</html>
